<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Feedback for PACMAN</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles/mainpage.css') }}">
    <style>
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            gap: 24px;
        }
        .login-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 40px 48px;
            border: 2px solid #FFD700;
            border-radius: 10px;
            background: #0a0a0a;
            min-width: 340px;
        }
        .login-box input[type="text"] {
            font-family: 'EmuLogic', monospace;
            font-size: 1.2em;
            letter-spacing: 0.2em;
            text-align: center;
            text-transform: uppercase;
            padding: 12px 20px;
            border-radius: 6px;
            border: 2px solid #4663FF;
            background: #111;
            color: #FFD700;
            outline: none;
            width: 100%;
        }
        .login-box input[type="text"]:focus {
            border-color: #FFD700;
        }
        .login-box input[type="text"]::placeholder {
            color: #444;
            letter-spacing: 0.1em;
        }
        .start-btn {
            font-family: 'EmuLogic', monospace;
            font-size: 0.85em;
            padding: 12px 40px;
            background: #000;
            color: #4663FF;
            border: 2px solid #4663FF;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            width: 100%;
        }
        .start-btn:hover {
            background: #4663FF;
            color: #000;
        }
        .error-msg {
            font-family: 'EmuLogic', monospace;
            font-size: 0.65em;
            color: #ff4444;
            text-align: center;
        }
        .subtitle {
            font-family: monospace;
            font-size: 0.85em;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Human feedback for Pacman</h1>

    <div class="login-container">
        <div class="login-box">
            <h2>Enter your code</h2>
            <p class="subtitle">You will have received this<br>from the researcher.</p>

            <form method="POST" action="/login" style="display:flex; flex-direction:column; gap:16px; width:100%;">
                <input type="text" name="code" placeholder="ABC123"
                       autofocus autocomplete="off" maxlength="32" required>
                <button class="start-btn" type="submit">START</button>
            </form>

            {% if error %}
            <p class="error-msg">{{ error }}</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
